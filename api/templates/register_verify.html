<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify email — Microgrid Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background-color: #f7fee7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .verify-card { max-width: 400px; width: 100%; }
  </style>
</head>
<body>
  <div class="verify-card mx-3">
    <div class="text-center mb-4">
      <h4 class="fw-bold">Verify your email</h4>
      <p class="text-muted small">We sent a 6-digit code to <strong>{{ email }}</strong>. Enter it below.</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('register_verify') }}">
          <input type="hidden" name="email" value="{{ email }}" />
          <div class="mb-3">
            <label class="form-label" for="otp">Verification code</label>
            <input type="text" class="form-control form-control-lg text-center" id="otp" name="otp" required
                   maxlength="6" minlength="6" pattern="[0-9]*" inputmode="numeric" autocomplete="one-time-code"
                   placeholder="000000" />
            <div class="form-text">Code expires in 10 minutes.</div>
          </div>
          <button type="submit" class="btn btn-success w-100">Verify and create account</button>
        </form>
        <p class="mt-3 mb-0 text-center small text-muted">
          Wrong email? <a href="{{ url_for('register') }}">Register again</a> &nbsp;·&nbsp;
          <a href="{{ url_for('login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
