<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register — Microgrid Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background-color: #f7fee7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .register-card { max-width: 440px; width: 100%; }
  </style>
</head>
<body>
  <div class="register-card mx-3">
    <div class="text-center mb-4">
      <h4 class="fw-bold">Create account</h4>
      <p class="text-muted small">Register to access the microgrid manager. Your system type and user type determine what you can see and do.</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('register') }}">
          <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input type="text" class="form-control" id="name" name="name" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password2">Confirm password</label>
            <input type="password" class="form-control" id="password2" name="password2" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="system_type">System type (package)</label>
            <select class="form-select" id="system_type" name="system_type" required>
              <option value="">Select…</option>
              <option value="household">Household Solar System</option>
              <option value="community">Community Microgrid</option>
              <option value="institutional">Institutional / Critical Facility</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label" for="role">User type (role)</label>
            <select class="form-select" id="role" name="role" required>
              <option value="">Select…</option>
              <option value="operator">Microgrid Operator</option>
              <option value="consumer">Energy Consumer</option>
              <option value="maintenance">Maintenance Engineer</option>
              <option value="utility">Utility / Grid Operator</option>
            </select>
            <div class="form-text">Your role determines which pages you can access.</div>
          </div>
          <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <p class="mt-3 mb-0 text-center small text-muted">
          Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
