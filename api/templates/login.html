<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — Microgrid Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background-color: #f7fee7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { max-width: 400px; }
    .navbar-brand { font-weight: 700; }
  </style>
</head>
<body>
  <div class="login-card w-100 mx-3">
    <div class="text-center mb-4">
      <h4 class="fw-bold">Adaptive Microgrid Manager</h4>
      <p class="text-muted small">Log in to access the system</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('login') }}">
          <input type="hidden" name="csrf_token" value="" />
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-success w-100">Log in</button>
        </form>
        <p class="mt-3 mb-0 text-center small text-muted">
          Don't have an account? <a href="{{ url_for('register') }}">Register</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
